# .github/workflows/daily_scraper.yml
# CollegeOS — Unified Admissions Scraper
#
# Runs daily at 02:00 UTC. Shards into 3 parallel jobs:
#   • us-scraper     — US + Canada colleges
#   • india-scraper  — Indian colleges (JoSAA / BITS / direct)
#   • europe-scraper — UK (UCAS) + DE + NL + FR + rest of EU
#
# Required repository secrets:
#   DATABASE_URL      — PostgreSQL connection string
#   SENTRY_DSN        — (optional) Sentry error tracking

name: Daily Admissions Scraper

on:
  schedule:
    # 02:00 UTC every day
    - cron: "0 2 * * *"

  # Allow manual trigger with optional country filter
  workflow_dispatch:
    inputs:
      country_codes:
        description: "Space-separated country codes to scrape (leave blank for all)"
        required: false
        default: ""
      limit:
        description: "Max institutions per shard (blank = no limit)"
        required: false
        default: ""

concurrency:
  group: scraper-${{ github.ref }}
  cancel-in-progress: false   # never cancel mid-run — DB state matters

jobs:
  # ── US + Canada ─────────────────────────────────────────────────────────────
  us-scraper:
    name: US + Canada Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SCRAPER_CONCURRENCY: 25
      RATE_LIMIT_DELAY: 2.0
      STALE_DAYS: 7
      USE_PLAYWRIGHT: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: scraper
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run US scraper
        working-directory: scraper
        run: |
          COUNTRY_ARGS="${{ github.event.inputs.country_codes }}"
          LIMIT_ARG="${{ github.event.inputs.limit }}"

          CMD="python orchestrator.py"

          if [ -n "$COUNTRY_ARGS" ]; then
            CMD="$CMD --country-codes $COUNTRY_ARGS"
          else
            CMD="$CMD --country-codes US CA"
          fi

          if [ -n "$LIMIT_ARG" ]; then
            CMD="$CMD --limit $LIMIT_ARG"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: us-scraper-logs-${{ github.run_id }}
          path: scraper/logs/
          retention-days: 14

  # ── India ────────────────────────────────────────────────────────────────────
  india-scraper:
    name: India Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SCRAPER_CONCURRENCY: 15
      RATE_LIMIT_DELAY: 3.0
      STALE_DAYS: 7
      USE_PLAYWRIGHT: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: scraper
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run India scraper
        working-directory: scraper
        run: |
          LIMIT_ARG="${{ github.event.inputs.limit }}"
          CMD="python orchestrator.py --country-codes IN"
          if [ -n "$LIMIT_ARG" ]; then
            CMD="$CMD --limit $LIMIT_ARG"
          fi
          echo "Running: $CMD"
          $CMD

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: india-scraper-logs-${{ github.run_id }}
          path: scraper/logs/
          retention-days: 14

  # ── Europe ───────────────────────────────────────────────────────────────────
  europe-scraper:
    name: Europe Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SCRAPER_CONCURRENCY: 20
      RATE_LIMIT_DELAY: 2.5
      STALE_DAYS: 7
      USE_PLAYWRIGHT: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: scraper
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run Europe scraper
        working-directory: scraper
        run: |
          LIMIT_ARG="${{ github.event.inputs.limit }}"
          CMD="python orchestrator.py --country-codes GB DE NL FR SE NO DK FI AT CH IT ES BE IE"
          if [ -n "$LIMIT_ARG" ]; then
            CMD="$CMD --limit $LIMIT_ARG"
          fi
          echo "Running: $CMD"
          $CMD

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: europe-scraper-logs-${{ github.run_id }}
          path: scraper/logs/
          retention-days: 14

  # ── Notify on full failure ───────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [us-scraper, india-scraper, europe-scraper]
    if: failure()

    steps:
      - name: Post failure summary
        run: |
          echo "## ❌ Scraper Run Failed" >> $GITHUB_STEP_SUMMARY
          echo "One or more regional scrapers failed. Check the logs above." >> $GITHUB_STEP_SUMMARY
          echo "Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
