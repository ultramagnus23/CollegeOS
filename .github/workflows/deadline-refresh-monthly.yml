name: Monthly Deadline Refresh Legacy Trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deadline-refresh-monthly-legacy
  cancel-in-progress: false

jobs:
  scrape-monthly-legacy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Workflow preflight diagnostics
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          mkdir -p workflow-diagnostics
          {
            echo "workflow=deadline-refresh-monthly"
            echo "run_id=${{ github.run_id }}"
            echo "sha=${{ github.sha }}"
            echo "python=$(python --version 2>&1)"
          } > workflow-diagnostics/env-snapshot.txt
          for name in SUPABASE_DB_URL; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error title=MissingSecret::${name} is not configured"
              exit 1
            fi
          done
          test -f scrapers/run_deadline_refresh.py || { echo "::error title=MissingScript::scrapers/run_deadline_refresh.py not found"; exit 1; }
          python - <<'PY'
          import json, os
          payload = {"supabase_db_url_present": bool(os.getenv("SUPABASE_DB_URL")), "script_exists": True}
          open("workflow-diagnostics/preflight-checks.json", "w", encoding="utf-8").write(json.dumps(payload, indent=2))
          PY
          echo "### Deadline monthly preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ secret validation done" >> "$GITHUB_STEP_SUMMARY"

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests beautifulsoup4

      - name: Bootstrap diagnostics
        run: |
          mkdir -p scraper_diagnostics
          printf '{"workflow":"deadline-refresh-monthly-legacy","status":"starting"}' > scraper_diagnostics/run_summary.json

      - name: Validate DB connectivity
        id: db_connectivity
        continue-on-error: true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python - <<'PY'
          import os, json, pathlib, psycopg2
          out = pathlib.Path('scraper_diagnostics/db_connectivity.json')
          payload = {'ok': False, 'error': None}
          try:
            conn = psycopg2.connect(os.environ['SUPABASE_DB_URL'], connect_timeout=8)
            cur = conn.cursor(); cur.execute('SELECT 1'); cur.fetchone(); cur.close(); conn.close()
            payload['ok'] = True
          except Exception as exc:
            payload['error'] = str(exc)
          out.write_text(json.dumps(payload, indent=2), encoding='utf-8')
          raise SystemExit(0 if payload['ok'] else 1)
          PY

      - name: Run monthly rolling refresh
        id: refresh
        continue-on-error: true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPE_MODE: monthly
          SCRAPER_DIAGNOSTICS_DIR: scraper_diagnostics
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -o pipefail
          python scrapers/run_deadline_refresh.py 2>&1 | tee scraper_diagnostics/legacy-monthly-refresh.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deadline-refresh-monthly-legacy-diagnostics
          path: scraper_diagnostics/
          if-no-files-found: error

      - name: Final status gate
        if: always()
        run: |
          if [ "${{ steps.db_connectivity.outcome }}" != "success" ] || [ "${{ steps.refresh.outcome }}" != "success" ]; then
            exit 1
          fi
