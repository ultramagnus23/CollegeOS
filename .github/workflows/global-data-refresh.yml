name: Global Data Refresh

on:
  schedule:
    - cron: '0 3 * * 3'  # Wednesdays 03:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: global-data-refresh
  cancel-in-progress: false

jobs:
  cwur-seed:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 psycopg2-binary python-dotenv
      - name: Preflight
        run: |
          set -euo pipefail
          [ -n "${DATABASE_URL:-}" ] || { echo "::error title=MissingSecret::DATABASE_URL not configured"; exit 1; }
          test -f scraper/sources/cwur_global_seed.py || { echo "::error::cwur_global_seed.py missing"; exit 1; }
      - name: Run CWUR global seed
        run: python scraper/sources/cwur_global_seed.py

  qs-rankings:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: cwur-seed
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary SPARQLWrapper python-dotenv
      - name: Preflight
        run: |
          set -euo pipefail
          [ -n "${DATABASE_URL:-}" ] || { echo "::error title=MissingSecret::DATABASE_URL not configured"; exit 1; }
          test -f scraper/sources/qs_rankings.py || { echo "::error::qs_rankings.py missing"; exit 1; }
      - name: Run QS rankings seed
        run: python scraper/sources/qs_rankings.py

  wikidata-enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: qs-rankings
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary SPARQLWrapper python-dotenv
      - name: Preflight
        run: |
          set -euo pipefail
          [ -n "${DATABASE_URL:-}" ] || { echo "::error title=MissingSecret::DATABASE_URL not configured"; exit 1; }
          test -f scraper/sources/wikidata_enrich.py || { echo "::error::wikidata_enrich.py missing"; exit 1; }
      - name: Run Wikidata enrichment
        run: python scraper/sources/wikidata_enrich.py
