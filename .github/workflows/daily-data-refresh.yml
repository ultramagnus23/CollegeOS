name: Daily College Data Refresh
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  refresh:
    name: Refresh College Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary requests pandas python-dotenv tenacity

      - name: Run data pipeline
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          IPEDS_API_KEY: ${{ secrets.IPEDS_API_KEY }}
          COLLEGE_SCORECARD_API_KEY: ${{ secrets.COLLEGE_SCORECARD_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scraper/pipeline.py
