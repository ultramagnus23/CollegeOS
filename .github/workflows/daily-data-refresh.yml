name: Daily College Data Refresh
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh College Data
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Workflow preflight diagnostics
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          IPEDS_API_KEY: ${{ secrets.IPEDS_API_KEY }}
          COLLEGE_SCORECARD_API_KEY: ${{ secrets.COLLEGE_SCORECARD_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p workflow-diagnostics
          {
            echo "workflow=daily-data-refresh"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "sha=${{ github.sha }}"
            echo "runner=${{ runner.os }}-${{ runner.arch }}"
            echo "python=$(python --version 2>&1)"
            echo "node=$(node --version 2>/dev/null || echo n/a)"
            echo "npm=$(npm --version 2>/dev/null || echo n/a)"
          } > workflow-diagnostics/env-snapshot.txt
          for name in SUPABASE_DB_URL IPEDS_API_KEY COLLEGE_SCORECARD_API_KEY; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error title=MissingSecret::${name} is not configured"
              exit 1
            fi
          done
          python - <<'PY'
          import json, os
          from urllib.parse import urlparse
          url = os.environ.get("SUPABASE_DB_URL", "")
          parsed = urlparse(url)
          payload = {
            "supabase_db_url_present": bool(url),
            "host": parsed.hostname,
            "scheme": parsed.scheme,
            "port": parsed.port,
          }
          open("workflow-diagnostics/preflight-checks.json", "w", encoding="utf-8").write(json.dumps(payload, indent=2))
          PY
          echo "### Daily workflow preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ secrets validated" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ diagnostics bootstrapped" >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests pandas python-dotenv tenacity

      - name: Bootstrap diagnostics directory
        run: |
          mkdir -p scraper_diagnostics
          python - <<'PY'
          import json, pathlib, datetime
          out = pathlib.Path('scraper_diagnostics')
          out.mkdir(parents=True, exist_ok=True)
          now = datetime.datetime.now(datetime.timezone.utc).isoformat()
          defaults = {
            'run_summary.json': {'workflow':'refresh-data','rows_upserted':0,'rows_skipped_error':0,'schema_errors':0,'retry_count':0,'status':'failed','fatal_error':None,'timestamp':now},
            'scraper_metrics.json': {'workflow':'refresh-data','rows_upserted':0,'rows_skipped_error':0,'schema_errors':0,'retry_count':0,'status':'failed','timestamp':now},
            'failed_colleges.json': [],
            'stale_colleges.json': [],
            'schema_errors.json': [],
          }
          for name, payload in defaults.items():
            p = out / name
            if not p.exists():
              p.write_text(json.dumps(payload, indent=2), encoding='utf-8')
          PY

      - name: Run data pipeline
        timeout-minutes: 25

        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          IPEDS_API_KEY: ${{ secrets.IPEDS_API_KEY }}
          COLLEGE_SCORECARD_API_KEY: ${{ secrets.COLLEGE_SCORECARD_API_KEY }}
          SCRAPER_DIAGNOSTICS_DIR: scraper_diagnostics
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p scraper_diagnostics
          python scraper/pipeline.py
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: daily-refresh-diagnostics
          path: scraper_diagnostics/
          if-no-files-found: ignore

      - name: Upload workflow diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: daily-refresh-workflow-diagnostics
          path: workflow-diagnostics/
          if-no-files-found: warn
