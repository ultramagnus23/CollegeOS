name: Daily College Data Refresh
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  refresh:
    name: Refresh College Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary requests pandas python-dotenv tenacity

      - name: Run data pipeline
        timeout-minutes: 25
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          IPEDS_API_KEY: ${{ secrets.IPEDS_API_KEY }}
          COLLEGE_SCORECARD_API_KEY: ${{ secrets.COLLEGE_SCORECARD_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p scraper_diagnostics
          python scraper/pipeline.py
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: daily-refresh-diagnostics
          path: scraper_diagnostics/
          if-no-files-found: ignore
