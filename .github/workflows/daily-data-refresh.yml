name: Daily College Data Refresh

on:
  schedule:
    - cron: '0 2 * * MON'   # Every Monday 02:00 UTC (IPEDS + NCES weekly)
    - cron: '0 3 1 * *'     # 1st of each month 03:00 UTC (CDS monthly)
  workflow_dispatch:
    inputs:
      run_ipeds:
        description: 'Fetch IPEDS data'
        type: boolean
        default: true
      run_cds:
        description: 'Fetch CDS web data'
        type: boolean
        default: true
      run_nces:
        description: 'Fetch NCES/CollegeData CSV'
        type: boolean
        default: true
      dry_run:
        description: 'Dry run (no DB writes)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ── Step 1: IPEDS / College Scorecard API ─────────────────────────────────
  fetch-ipeds:
    name: Fetch IPEDS (College Scorecard API)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_ipeds != 'false')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scripts/data-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/scripts/data-pipeline/requirements.txt

      - name: Fetch IPEDS data
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          ADMISSIONS_YEAR: '2023'
          IPEDS_STAGING_PATH: /tmp/ipeds_staging.json
        run: python backend/scripts/data-pipeline/fetch-ipeds.py

      - name: Upload IPEDS staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipeds-staging
          path: /tmp/ipeds_staging.json
          retention-days: 1

  # ── Step 2: CDS web scraper (monthly) ─────────────────────────────────────
  fetch-cds:
    name: Fetch CDS (College Websites)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: fetch-ipeds
    if: >-
      github.event.schedule == '0 3 1 * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_cds != 'false')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scripts/data-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/scripts/data-pipeline/requirements.txt

      - name: Download IPEDS staging
        uses: actions/download-artifact@v4
        with:
          name: ipeds-staging
          path: /tmp/

      - name: Fetch CDS data
        env:
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          IPEDS_STAGING_PATH: /tmp/ipeds_staging.json
          CDS_STAGING_PATH: /tmp/cds_staging.json
        run: python backend/scripts/data-pipeline/fetch-cds-web.py

      - name: Upload CDS staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: cds-staging
          path: /tmp/cds_staging.json
          retention-days: 1

  # ── Step 3: NCES / CollegeData bulk CSV ───────────────────────────────────
  fetch-nces:
    name: Fetch NCES CollegeData CSV
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_nces != 'false')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scripts/data-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/scripts/data-pipeline/requirements.txt

      - name: Fetch NCES bulk CSV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COLLEGEDATA_STAGING_PATH: /tmp/collegedata_staging.json
        run: python backend/scripts/data-pipeline/fetch-collegedata-org.py

      - name: Upload NCES staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: nces-staging
          path: /tmp/collegedata_staging.json
          retention-days: 1

  # ── Step 4: Validate + Load ───────────────────────────────────────────────
  validate-and-load:
    name: Validate & Load to PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [fetch-ipeds, fetch-nces]
    if: always() && (needs.fetch-ipeds.result == 'success' || needs.fetch-nces.result == 'success')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/scripts/data-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/scripts/data-pipeline/requirements.txt

      - name: Download IPEDS staging
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ipeds-staging
          path: /tmp/

      - name: Download CDS staging
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: cds-staging
          path: /tmp/

      - name: Download NCES staging
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: nces-staging
          path: /tmp/

      - name: Validate data quality
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IPEDS_STAGING_PATH: /tmp/ipeds_staging.json
          CDS_STAGING_PATH: /tmp/cds_staging.json
          COLLEGEDATA_STAGING_PATH: /tmp/collegedata_staging.json
        run: python backend/scripts/data-pipeline/validate-data.py

      - name: Load to PostgreSQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          IPEDS_STAGING_PATH: /tmp/ipeds_staging.json
          CDS_STAGING_PATH: /tmp/cds_staging.json
          COLLEGEDATA_STAGING_PATH: /tmp/collegedata_staging.json
        run: python backend/scripts/data-pipeline/load-to-postgres.py

  # ── Step 5: Failure notification ──────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [fetch-ipeds, fetch-nces, validate-and-load]
    if: failure()

    steps:
      - name: Notify Slack on failure
        if: ${{ secrets.SLACK_WEBHOOK != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "⚠️ CollegeOS data pipeline failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*⚠️ CollegeOS Daily Data Refresh failed*\nWorkflow: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
