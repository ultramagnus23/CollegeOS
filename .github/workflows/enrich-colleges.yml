name: Weekly College Data Enrichment
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read

concurrency:
  group: enrich-colleges
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '24' }
      - name: Workflow preflight diagnostics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCORECARD_API_KEY: ${{ secrets.SCORECARD_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p workflow-diagnostics
          {
            echo "workflow=enrich-colleges"
            echo "run_id=${{ github.run_id }}"
            echo "sha=${{ github.sha }}"
            echo "node=$(node --version)"
            echo "npm=$(npm --version)"
          } > workflow-diagnostics/env-snapshot.txt
          for name in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY SCORECARD_API_KEY; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error title=MissingSecret::${name} is not configured"
              exit 1
            fi
          done
          for file in scripts/runMigrations.js scripts/enrichColleges.js scripts/enrichmentReport.js; do
            if [ ! -f "$file" ]; then
              echo "::error title=MissingScript::${file} not found"
              exit 1
            fi
          done
          node -e "const fs=require('fs');fs.writeFileSync('workflow-diagnostics/preflight-checks.json', JSON.stringify({scripts_ok:true,secrets_ok:true,ts:new Date().toISOString()},null,2));"
          echo "### Enrichment workflow preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ required secrets present" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ referenced scripts found" >> "$GITHUB_STEP_SUMMARY"
      - run: npm ci
      - name: Bootstrap diagnostics
        run: |
          mkdir -p scraper_diagnostics
          printf '{"workflow":"enrich-colleges","status":"starting"}' > scraper_diagnostics/run_summary.json
      - name: Run migrations
        run: node scripts/runMigrations.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Enrich college data
        timeout-minutes: 90
        run: node scripts/enrichColleges.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCORECARD_API_KEY: ${{ secrets.SCORECARD_API_KEY }}
          USD_TO_INR_RATE: '83'

      - name: Post enrichment summary
        if: always()
        run: node scripts/enrichmentReport.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: enrich-colleges-diagnostics
          path: scraper_diagnostics/
          if-no-files-found: ignore
      - name: Upload workflow diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: enrich-colleges-workflow-diagnostics
          path: workflow-diagnostics/
          if-no-files-found: warn
