name: Weekly College Data Enrichment
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: enrich-colleges
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '24' }
      - run: npm ci
      - name: Bootstrap diagnostics
        run: |
          mkdir -p scraper_diagnostics
          printf '{"workflow":"enrich-colleges","status":"starting"}' > scraper_diagnostics/run_summary.json
      - name: Run migrations
        run: node scripts/runMigrations.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Enrich college data
        timeout-minutes: 90
        run: node scripts/enrichColleges.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCORECARD_API_KEY: ${{ secrets.SCORECARD_API_KEY }}
          USD_TO_INR_RATE: '83'

      - name: Post enrichment summary
        if: always()
        run: node scripts/enrichmentReport.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: enrich-colleges-diagnostics
          path: scraper_diagnostics/
          if-no-files-found: ignore
