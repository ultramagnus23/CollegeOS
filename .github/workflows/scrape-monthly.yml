name: Rolling Monthly Canonical Deadline Refresh

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scrape-monthly
  cancel-in-progress: false

jobs:
  scrape-monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests beautifulsoup4
          python -m pip freeze > /tmp/pip-freeze.txt

      - name: Run scrape-weekly smoke tests
        run: python -m unittest scrapers.tests.test_scrape_weekly_smoke -v

      - name: Bootstrap diagnostics directory
        run: |
          mkdir -p scraper_diagnostics
          cp /tmp/pip-freeze.txt scraper_diagnostics/pip-freeze.txt
          python - <<'PY'
          import json, pathlib, datetime
          out = pathlib.Path('scraper_diagnostics')
          out.mkdir(parents=True, exist_ok=True)
          now = datetime.datetime.now(datetime.timezone.utc).isoformat()
          defaults = {
            'run_summary.json': {'workflow':'scrape-monthly','institutions_processed':0,'success_count':0,'failure_count':0,'schema_errors':0,'network_errors':0,'retry_count':0,'stale_records_detected':0,'duration_seconds':0,'status':'failed','degraded':False,'fatal_error':'not_started','timestamp':now},
            'scraper_metrics.json': {'workflow':'scrape-monthly','institutions_processed':0,'success_count':0,'failure_count':0,'schema_errors':0,'network_errors':0,'retry_count':0,'stale_records_detected':0,'duration_seconds':0,'status':'failed','timestamp':now},
            'failed_colleges.json': [],
            'stale_colleges.json': [],
            'schema_errors.json': [],
          }
          for name, payload in defaults.items():
            p = out / name
            if not p.exists():
              p.write_text(json.dumps(payload, indent=2), encoding='utf-8')
          PY

      - name: Verify DB connectivity
        id: db_connectivity
        continue-on-error: true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python - <<'PY'
          import json, os, pathlib, psycopg2
          out = pathlib.Path('scraper_diagnostics/db_connectivity.json')
          payload = {'ok': False, 'error': None}
          db_url = os.environ.get('SUPABASE_DB_URL')
          if not db_url:
            payload['error'] = 'SUPABASE_DB_URL missing'
          else:
            try:
              conn = psycopg2.connect(db_url, connect_timeout=8)
              cur = conn.cursor(); cur.execute('SELECT 1'); cur.fetchone(); cur.close(); conn.close()
              payload['ok'] = True
            except Exception as exc:
              payload['error'] = str(exc)
          out.write_text(json.dumps(payload, indent=2), encoding='utf-8')
          raise SystemExit(0 if payload['ok'] else 1)
          PY

      - name: Run monthly rolling refresh
        id: run_monthly_refresh
        continue-on-error: true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPE_MODE: monthly
          SCRAPER_DIAGNOSTICS_DIR: scraper_diagnostics
          SCRAPER_BATCH_SIZE: '25'
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -o pipefail
          python scrapers/run_deadline_refresh.py 2>&1 | tee scraper_diagnostics/monthly-refresh.log

      - name: Build confidence-drop report
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path('scraper_diagnostics/diagnostics.json')
          out = pathlib.Path('scraper_diagnostics/confidence_drops.json')
          if not p.exists():
            out.write_text('[]', encoding='utf-8')
          else:
            rows = json.loads(p.read_text(encoding='utf-8'))
            drops = [r for r in rows if r.get('confidence_score', 0) < 0.5]
            out.write_text(json.dumps(drops, indent=2), encoding='utf-8')
          PY

      - name: Ensure diagnostics completeness
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib, datetime
          out = pathlib.Path('scraper_diagnostics')
          out.mkdir(parents=True, exist_ok=True)
          now = datetime.datetime.now(datetime.timezone.utc).isoformat()
          defaults = {
            'run_summary.json': {'workflow':'scrape-monthly','status':'failed','fatal_error':'fallback_bootstrap','timestamp':now},
            'scraper_metrics.json': {'workflow':'scrape-monthly','status':'failed','timestamp':now},
            'failed_colleges.json': [],
            'stale_colleges.json': [],
            'schema_errors.json': [],
          }
          for name, payload in defaults.items():
            p = out / name
            if not p.exists():
              p.write_text(json.dumps(payload, indent=2), encoding='utf-8')
          PY

      - name: Compress diagnostics
        if: always()
        run: tar -czf scraper_diagnostics.tar.gz scraper_diagnostics

      - name: Upload diagnostics directory
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: monthly-deadline-diagnostics
          path: scraper_diagnostics/
          if-no-files-found: error
          compression-level: 9

      - name: Upload diagnostics archive
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: monthly-deadline-diagnostics-archive
          path: scraper_diagnostics.tar.gz
          if-no-files-found: error
          compression-level: 9

      - name: Enforce fatal-only failure semantics
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib, sys
          out = pathlib.Path('scraper_diagnostics')
          rs = {}
          if (out / 'run_summary.json').exists():
            rs = json.loads((out / 'run_summary.json').read_text(encoding='utf-8'))
          status = rs.get('status', 'failed')
          fatal_error = rs.get('fatal_error')
          print(json.dumps({'workflow':'scrape-monthly','status':status,'fatal_error':fatal_error,'db_connectivity':'${{ steps.db_connectivity.outcome }}','refresh_outcome':'${{ steps.run_monthly_refresh.outcome }}'}))
          if '${{ steps.db_connectivity.outcome }}' != 'success':
            sys.exit(1)
          if '${{ steps.run_monthly_refresh.outcome }}' != 'success':
            sys.exit(1)
          if status == 'failed':
            sys.exit(1)
          sys.exit(0)
          PY
