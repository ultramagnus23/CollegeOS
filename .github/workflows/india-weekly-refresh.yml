name: India Weekly Structured Refresh

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  india-weekly-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Workflow preflight diagnostics
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          mkdir -p workflow-diagnostics
          {
            echo "workflow=india-weekly-refresh"
            echo "run_id=${{ github.run_id }}"
            echo "sha=${{ github.sha }}"
            echo "python=$(python --version 2>&1)"
            echo "node=$(node --version)"
          } > workflow-diagnostics/env-snapshot.txt
          [ -n "${SUPABASE_DB_URL:-}" ] || { echo "::error title=MissingSecret::SUPABASE_DB_URL not configured"; exit 1; }
          test -f scraper/indian/pipelines/run_india_refresh.py || { echo "::error title=MissingScript::run_india_refresh.py not found"; exit 1; }
          python - <<'PY'
          import json, os
          checks = {"supabase_db_url_present": bool(os.getenv("SUPABASE_DB_URL")), "script_exists": True}
          open("workflow-diagnostics/preflight-checks.json", "w", encoding="utf-8").write(json.dumps(checks, indent=2))
          PY
          echo "### India weekly preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ secret + script checks passed" >> "$GITHUB_STEP_SUMMARY"

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Bootstrap diagnostics directory
        run: |
          mkdir -p scraper_diagnostics
          printf '{}' > scraper_diagnostics/india_health_summary.json
          printf '[]' > scraper_diagnostics/india_dead_letter.json
          printf '[]' > scraper_diagnostics/india_stale_records.json
          printf '[]' > scraper_diagnostics/india_write_dead_letter.json

      - name: Run india weekly ingestion
        id: run_ingestion
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPE_MODE: weekly
          SCRAPER_DIAGNOSTICS_DIR: scraper_diagnostics
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set +e
          python -m scraper.indian.pipelines.run_india_refresh
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Stale scraper detection + health summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          stale_path = Path('scraper_diagnostics/india_stale_records.json')
          summary_path = Path('scraper_diagnostics/india_health_summary.json')
          stale = []
          if stale_path.exists():
            stale = json.loads(stale_path.read_text(encoding='utf-8'))
          summary = {}
          if summary_path.exists():
            summary = json.loads(summary_path.read_text(encoding='utf-8'))
          summary['stale_detection'] = {
            'stale_count': len(stale),
            'stale_threshold': 100,
            'stale_exceeded': len(stale) > 100,
          }
          summary_path.write_text(json.dumps(summary, indent=2), encoding='utf-8')
          with open(Path('scraper_diagnostics') / 'india_scraper_health.md', 'w', encoding='utf-8') as fh:
            fh.write(f"# India Scraper Health\n\nStatus: {summary.get('status', 'unknown')}\n\nStale records: {len(stale)}\n")
          PY

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: india-weekly-diagnostics
          path: scraper_diagnostics/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload workflow diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: india-weekly-workflow-diagnostics
          path: workflow-diagnostics/
          if-no-files-found: warn
          retention-days: 14

      - name: Failure notification
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = 'failed'
          p = Path('scraper_diagnostics/india_health_summary.json')
          if p.exists():
            status = json.loads(p.read_text(encoding='utf-8')).get('status', 'failed')
          exit_code = int('${{ steps.run_ingestion.outputs.exit_code || "1" }}')
          if status == 'failed' or exit_code != 0:
            print('::error::India weekly ingestion failed')
            raise SystemExit(1)
          print(f'India weekly ingestion completed with status={status}')
          PY
