name: Weekly Canonical Deadline Refresh

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 4 * * 0"

  workflow_dispatch:

permissions:
  contents: read


concurrency:
  group: scrape-weekly
  cancel-in-progress: false

jobs:
  scrape-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests beautifulsoup4
      - name: Bootstrap diagnostics directory
        run: |
          mkdir -p scraper_diagnostics
          printf '{}' > scraper_diagnostics/run_summary.json
          printf '{}' > scraper_diagnostics/scraper_metrics.json
          printf '[]' > scraper_diagnostics/failed_colleges.json
          printf '[]' > scraper_diagnostics/schema_errors.json
      - name: Run weekly refresh
        id: run_scraper

        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPE_MODE: weekly
          SCRAPER_DIAGNOSTICS_DIR: scraper_diagnostics

          PYTHONPATH: ${{ github.workspace }}
        run: |
          set +e
          python scrapers/run_deadline_refresh.py
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Fallback diagnostics bootstrap
        if: always()
        run: |
          mkdir -p scraper_diagnostics
          [ -f scraper_diagnostics/run_summary.json ] || printf '{"workflow":"scrape-weekly","status":"failed","reason":"fallback_bootstrap"}' > scraper_diagnostics/run_summary.json
          [ -f scraper_diagnostics/scraper_metrics.json ] || printf '{"workflow":"scrape-weekly","degraded":true}' > scraper_diagnostics/scraper_metrics.json
          [ -f scraper_diagnostics/failed_colleges.json ] || printf '[]' > scraper_diagnostics/failed_colleges.json
          [ -f scraper_diagnostics/schema_errors.json ] || printf '[]' > scraper_diagnostics/schema_errors.json
      - name: Compress diagnostics
        if: always()
        run: |
          tar -czf scraper_diagnostics.tar.gz scraper_diagnostics || true
      - name: Upload diagnostics directory
        if: always()
        uses: actions/upload-artifact@v5
        continue-on-error: true

        with:
          name: weekly-deadline-diagnostics
          path: scraper_diagnostics/
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload diagnostics archive
        if: always()
        uses: actions/upload-artifact@v5
        continue-on-error: true

        with:
          name: weekly-deadline-diagnostics-archive
          path: scraper_diagnostics.tar.gz
          if-no-files-found: ignore
          retention-days: 14
      - name: Final status gate
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path("scraper_diagnostics/run_summary.json")
          status = "failed"
          if summary_path.exists():
            try:
              status = json.loads(summary_path.read_text(encoding="utf-8")).get("status", "failed")
            except Exception:
              status = "failed"
          exit_code = int("${{ steps.run_scraper.outputs.exit_code || '1' }}")
          if status == "failed" or exit_code != 0:
            raise SystemExit(1)
          print(f"scrape-weekly status={status} exit_code={exit_code}")
          PY

  workflow-smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install smoke test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests beautifulsoup4
      - name: Run weekly scraper smoke tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m unittest scrapers.tests.test_scrape_weekly_smoke -v

