name: Weekly Canonical Deadline Refresh

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scrape-weekly
  cancel-in-progress: false

jobs:
  scrape-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests beautifulsoup4
          python -m pip freeze > /tmp/pip-freeze.txt

      - name: Bootstrap diagnostics directory
        run: |
          mkdir -p scraper_diagnostics
          cp /tmp/pip-freeze.txt scraper_diagnostics/pip-freeze.txt
          printf '{}' > scraper_diagnostics/run_summary.json
          printf '{}' > scraper_diagnostics/scraper_metrics.json
          printf '[]' > scraper_diagnostics/failed_colleges.json
          printf '[]' > scraper_diagnostics/schema_errors.json

      - name: Verify DB connectivity
        id: db_connectivity
        continue-on-error: true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python - <<'PY'
          import json, os, pathlib, psycopg2
          out = pathlib.Path('scraper_diagnostics/db_connectivity.json')
          payload = {'ok': False, 'error': None}
          db_url = os.environ.get('SUPABASE_DB_URL')
          if not db_url:
            payload['error'] = 'SUPABASE_DB_URL missing'
          else:
            try:
              conn = psycopg2.connect(db_url, connect_timeout=8)
              cur = conn.cursor(); cur.execute('SELECT 1'); cur.fetchone(); cur.close(); conn.close()
              payload['ok'] = True
            except Exception as exc:
              payload['error'] = str(exc)
          out.write_text(json.dumps(payload, indent=2), encoding='utf-8')
          raise SystemExit(0 if payload['ok'] else 1)
          PY

      - name: Run weekly refresh
        id: run_scraper
        continue-on-error: true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPE_MODE: weekly
          SCRAPER_DIAGNOSTICS_DIR: scraper_diagnostics
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -o pipefail
          python scrapers/run_deadline_refresh.py 2>&1 | tee scraper_diagnostics/weekly-refresh.log

      - name: Fallback diagnostics bootstrap
        if: always()
        run: |
          mkdir -p scraper_diagnostics
          [ -f scraper_diagnostics/run_summary.json ] || printf '{"workflow":"scrape-weekly","status":"failed","reason":"fallback_bootstrap"}' > scraper_diagnostics/run_summary.json
          [ -f scraper_diagnostics/scraper_metrics.json ] || printf '{"workflow":"scrape-weekly","degraded":true}' > scraper_diagnostics/scraper_metrics.json
          [ -f scraper_diagnostics/failed_colleges.json ] || printf '[]' > scraper_diagnostics/failed_colleges.json
          [ -f scraper_diagnostics/schema_errors.json ] || printf '[]' > scraper_diagnostics/schema_errors.json

      - name: Build workflow summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          out = Path('scraper_diagnostics')
          rs = {}
          fc = {}
          if (out / 'run_summary.json').exists():
            rs = json.loads((out / 'run_summary.json').read_text(encoding='utf-8'))
          if (out / 'db_connectivity.json').exists():
            fc = json.loads((out / 'db_connectivity.json').read_text(encoding='utf-8'))
          payload = {
            'workflow': 'scrape-weekly',
            'status': rs.get('status', 'unknown'),
            'failure_count': rs.get('failure_count', 0),
            'schema_errors': rs.get('schema_errors', 0),
            'db_ok': fc.get('ok', False),
            'scraper_outcome': '${{ steps.run_scraper.outcome }}'
          }
          (out / 'workflow_summary.json').write_text(json.dumps(payload, indent=2), encoding='utf-8')
          PY

      - name: Compress diagnostics
        if: always()
        run: tar -czf scraper_diagnostics.tar.gz scraper_diagnostics

      - name: Upload diagnostics directory
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: weekly-deadline-diagnostics
          path: scraper_diagnostics/
          if-no-files-found: error
          retention-days: 14

      - name: Upload diagnostics archive
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: weekly-deadline-diagnostics-archive
          path: scraper_diagnostics.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Final status gate
        if: always()
        run: |
          if [ "${{ steps.db_connectivity.outcome }}" != "success" ] || [ "${{ steps.run_scraper.outcome }}" != "success" ]; then
            echo "Weekly scraper failed. See artifacts."
            exit 1
          fi

  workflow-smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install smoke test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests beautifulsoup4
      - name: Run weekly scraper smoke tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m unittest scrapers.tests.test_scrape_weekly_smoke -v
