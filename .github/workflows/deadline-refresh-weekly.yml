name: Weekly Canonical Deadline Refresh

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: |
          pip install psycopg2-binary requests beautifulsoup4

      - name: Run weekly refresh
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPE_MODE: weekly
          SCRAPER_DIAGNOSTICS_DIR: scraper_diagnostics
        run: |
          python scrapers/run_deadline_refresh.py

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-deadline-diagnostics
          path: scraper_diagnostics/
          if-no-files-found: warn

