name: Onboarding E2E Smoke Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  pull_request_target:
  push:
    branches:
      - main
      - master
      - copilot/**
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: read

concurrency:
  group: onboarding-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  onboarding-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Bootstrap diagnostics
        run: |
          mkdir -p diagnostics/onboarding-smoke
          node -v | tee diagnostics/onboarding-smoke/node-version.txt
          npm -v | tee diagnostics/onboarding-smoke/npm-version.txt
          python --version | tee diagnostics/onboarding-smoke/python-version.txt
          {
            echo "branch=${GITHUB_REF_NAME}"
            echo "sha=${GITHUB_SHA}"
            echo "actor=${GITHUB_ACTOR}"
            echo "has_SUPABASE_DB_URL=${{ secrets.SUPABASE_DB_URL != '' }}"
            echo "has_JWT_SECRET=${{ secrets.JWT_SECRET != '' }}"
            echo "has_REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET != '' }}"
          } | tee diagnostics/onboarding-smoke/startup-diagnostics.txt
          env | sort > diagnostics/onboarding-smoke/environment.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Verify DB connectivity
        id: db_connectivity
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          cd backend
          node - <<'NODE'
          const { Client } = require('pg');
          const fs = require('fs');
          const payload = { ok: false, error: null };
          const url = process.env.DATABASE_URL;
          async function run() {
            if (!url) {
              payload.error = 'SUPABASE_DB_URL missing';
            } else {
              const client = new Client({ connectionString: url, ssl: { rejectUnauthorized: false } });
              try {
                await client.connect();
                await client.query('SELECT 1');
                payload.ok = true;
              } catch (e) {
                payload.error = e.message;
              } finally {
                try { await client.end(); } catch (e) {}
              }
            }
            fs.writeFileSync('../diagnostics/onboarding-smoke/db-connectivity.json', JSON.stringify(payload, null, 2));
            process.exit(payload.ok ? 0 : 1);
          }
          run();
          NODE

      - name: Run onboarding smoke E2E tests
        id: onboarding_test
        continue-on-error: true
        env:
          ENABLE_DB_TESTS: 'true'
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
        run: |
          cd backend
          npx jest tests/integration/onboardingSmoke.test.js tests/integration/fullOnboardingJourney.test.js --runInBand --coverage=false 2>&1 | tee ../diagnostics/onboarding-smoke/onboarding-smoke.log

      - name: Run full production validation gate
        id: full_check
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          node scripts/full-production-check.js --skip-scraper 2>&1 | tee diagnostics/onboarding-smoke/full-production-check.log

      - name: Build workflow summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          out = Path('diagnostics/onboarding-smoke')
          payload = {
            'workflow': 'onboarding-smoke',
            'db_connectivity_outcome': '${{ steps.db_connectivity.outcome }}',
            'onboarding_test_outcome': '${{ steps.onboarding_test.outcome }}',
            'full_check_outcome': '${{ steps.full_check.outcome }}',
          }
          if payload['db_connectivity_outcome'] != 'success':
            payload['failure_category'] = 'db_connectivity_failure'
          elif payload['onboarding_test_outcome'] != 'success':
            payload['failure_category'] = 'onboarding_e2e_failure'
          elif payload['full_check_outcome'] != 'success':
            payload['failure_category'] = 'production_gate_failure'
          else:
            payload['failure_category'] = 'none'
          (out / 'workflow-summary.json').write_text(json.dumps(payload, indent=2), encoding='utf-8')
          print('## Onboarding smoke validation summary')
          for k, v in payload.items():
            print(f'- {k}: {v}')
          PY

      - name: Upload onboarding smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: onboarding-smoke-diagnostics
          path: diagnostics/onboarding-smoke/
          if-no-files-found: error
          compression-level: 9

      - name: Final status gate
        if: always()
        run: |
          if [ "${{ steps.db_connectivity.outcome }}" != "success" ] || [ "${{ steps.onboarding_test.outcome }}" != "success" ] || [ "${{ steps.full_check.outcome }}" != "success" ]; then
            echo "Onboarding smoke validation failed. See onboarding-smoke-diagnostics artifact."
            exit 1
          fi
